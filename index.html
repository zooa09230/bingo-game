<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방송용 실시간 빙고 땅따먹기 판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .tile-btn { transition: all 0.2s; border: 1px solid #334155; }
        .tile-btn:hover { transform: scale(1.02); z-index: 10; border-color: #94a3b8; }
        .locked { opacity: 0.6; cursor: not-allowed; border: 4px solid #facc15 !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto space-y-4">
        <header class="flex flex-wrap justify-between items-center bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-xl gap-4">
            <div>
                <h1 class="text-2xl font-black italic text-yellow-400 tracking-tight">BINGO LAND</h1>
                <div id="statusTag" class="text-xs text-gray-400">실시간 땅따먹기 관제판</div>
            </div>
            <div class="flex flex-wrap gap-2">
                <select id="teamSelect" onchange="window.updateMemberSelect()" class="bg-gray-800 p-2 rounded text-sm font-bold border border-gray-700 text-white"></select>
                <select id="memberSelect" class="bg-gray-800 p-2 rounded text-sm font-bold border border-gray-700 text-white"></select>
                <button id="chickenBtn" onclick="window.toggleChicken()" class="px-4 py-2 rounded-lg border text-sm font-black transition-all">🍗 치킨모드</button>
                <button onclick="window.resetBoard()" class="bg-red-900 hover:bg-red-800 px-4 py-2 rounded-lg text-sm font-black text-white border border-red-700">전체 초기화</button>
                <button onclick="window.undoMove()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm font-black text-white">↩ Undo</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-3 space-y-4">
                <div class="grid grid-cols-10 gap-1 bg-gray-900 p-3 rounded-xl aspect-square border border-gray-800 shadow-2xl" id="board"></div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 h-48 overflow-y-auto text-xs font-medium" id="logList"></div>
            </div>
            <div class="space-y-4">
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                    <h2 class="text-sm font-bold text-yellow-400 mb-2">⏱️ 게임 타이머</h2>
                    <div id="timerDisplay" class="text-4xl font-mono font-black text-white mb-3 tracking-widest">04:00:00</div>
                    <div class="flex gap-2 justify-center">
                        <button onclick="window.toggleTimer()" id="timerCtrlBtn" class="bg-green-700 hover:bg-green-600 px-6 py-2 rounded text-sm font-black text-white">시작</button>
                        <button onclick="window.resetTimer()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-black text-white">초기화</button>
                    </div>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <h2 class="text-sm font-bold text-yellow-400 mb-2">🏆 점수판</h2>
                    <div id="scoreboard" class="text-sm space-y-1"></div>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <h2 class="text-sm font-bold text-yellow-400 mb-2">🗺️ 팀별 맵</h2>
                    <div id="mapList" class="space-y-2 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AizaSyD-rLRddJFNBzLKCua62yduQmhRPYczis8",
            authDomain: "bingo-9953d.firebaseapp.com",
            projectId: "bingo-9953d",
            storageBucket: "bingo-9953d.appspot.com",
            messagingSenderId: "550809736051",
            appId: "1:550809736051:web:86f22b238585ea01c1eb06"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.TEAMS = {
            JUA: { name: "주아팀", color: "bg-green-500", border: "border-green-500", members: ["연주아", "치포", "복히", "루하"] },
            REX: { name: "렉스팀", color: "bg-orange-500", border: "border-orange-500", members: ["렉스", "치명적여사", "잭잭", "오따식"] },
            MIKI: { name: "믹이팀", color: "bg-red-600", border: "border-red-600", members: ["믹", "달님", "처니씨", "현자군"] },
            DAMHI: { name: "담히팀", color: "bg-sky-500", border: "border-sky-500", members: ["도담히", "유매미", "손진석", "이티드"] },
            HARO: { name: "하로팀", color: "bg-yellow-400", border: "border-yellow-400", members: ["나하로", "잉누", "주이짱", "한시아"] },
            JUJU: { name: "쥬쥬팀", color: "bg-pink-500", border: "border-pink-500", members: ["아이엠쥬노", "한초월", "도라니", "앙단테"] }
        };
        const MAP_LIST = ["에란겔", "사녹", "테이고", "비켄디", "카라킨"];
        const TIMER_DURATION = 14400;

        let state = { tiles: Array(100).fill({ owner: null, hasChicken: false, isLocked: false }), teamMapState: {}, logs: [], history: [], isChickenMode: false, timerSeconds: TIMER_DURATION, isTimerRunning: false };

        db.collection("game").doc("bingoData").onSnapshot((doc) => {
            if (doc.exists) {
                state = doc.data();
                window.render();
            } else {
                window.initDefaultState();
            }
        });

        window.saveState = function() { db.collection("game").doc("bingoData").set(state); };

        window.initDefaultState = function() {
            state = {
                tiles: Array(100).fill(null).map(() => ({ owner: null, hasChicken: false, isLocked: false })),
                teamMapState: {},
                isChickenMode: false,
                logs: [],
                history: [],
                timerSeconds: TIMER_DURATION,
                isTimerRunning: false
            };
            Object.keys(window.TEAMS).forEach(t => {
                state.teamMapState[t] = { maps: [...MAP_LIST].sort(() => Math.random() - 0.5), index: 0 };
            });
            window.saveState();
        }

        window.handleTileClick = (idx) => {
            state.history.push(JSON.parse(JSON.stringify(state.tiles)));
            state.tiles[idx] = { owner: document.getElementById("teamSelect").value, hasChicken: state.isChickenMode, isLocked: false };
            state.logs.unshift({ time: new Date().toLocaleTimeString().slice(0, 8), msg: `${document.getElementById("memberSelect").value}님이 ${idx + 1}번 점령!` });
            window.saveState();
        };

        window.render = () => {
            const board = document.getElementById("board");
            board.innerHTML = "";
            state.tiles.forEach((t, i) => {
                const btn = document.createElement("button");
                btn.className = `tile-btn aspect-square flex items-center justify-center font-extrabold text-sm rounded-lg ${t.owner ? window.TEAMS[t.owner].color : 'bg-gray-800'} ${t.isLocked ? 'locked' : ''} transition-all`;
                btn.innerHTML = t.hasChicken ? "🍗" : (i + 1);
                btn.onclick = () => window.handleTileClick(i);
                board.appendChild(btn);
            });
            document.getElementById("logList").innerHTML = state.logs.map(l => `<div class="mb-1 border-b border-gray-700 pb-1 text-gray-200"><span class="text-gray-500 font-mono">[${l.time}]</span> ${l.msg}</div>`).join('');
            document.getElementById("timerDisplay").innerText = window.formatTime(state.timerSeconds);
            document.getElementById("timerCtrlBtn").innerText = state.isTimerRunning ? "정지" : "시작";
            const scores = {};
            state.tiles.forEach(t => t.owner && (scores[t.owner] = (scores[t.owner]||0)+1));
            document.getElementById("scoreboard").innerHTML = Object.keys(window.TEAMS).map(k => `
                <div class="flex justify-between px-3 py-2 bg-gray-800 rounded items-center">
                    <span class="text-white font-bold">${window.TEAMS[k].name}</span>
                    <span class="font-black text-yellow-400 text-lg">${scores[k]||0}</span>
                </div>
            `).join('');
            document.getElementById("mapList").innerHTML = Object.keys(window.TEAMS).map(t => `
                <div class="bg-gray-800 p-2 rounded flex justify-between items-center border-l-4 ${window.TEAMS[t].border}">
                    <span class="text-sm font-bold text-gray-100">${window.TEAMS[t].name}</span>
                    <div class="flex items-center gap-2">
                        <span class="font-black text-yellow-300">${state.teamMapState[t]?.maps?.[state.teamMapState[t]?.index] || "에란겔"}</span>
                        <button onclick="window.rotateMap('${t}')" class="text-white">🔄</button>
                    </div>
                </div>
            `).join('');
        };

        window.updateMemberSelect = () => { 
            const team = document.getElementById("teamSelect").value; 
            document.getElementById("memberSelect").innerHTML = window.TEAMS[team].members.map(m => `<option value="${m}">${m}</option>`).join(''); 
        };
        window.toggleChicken = () => { state.isChickenMode = !state.isChickenMode; window.render(); };
        window.rotateMap = (t) => { state.teamMapState[t].index = (state.teamMapState[t].index + 1) % 5; window.saveState(); };
        window.undoMove = () => { if(state.history.length > 0) { state.tiles = state.history.pop(); window.saveState(); } };
        window.resetBoard = () => { if(confirm("초기화?")) window.initDefaultState(); };
        window.toggleTimer = () => { state.isTimerRunning = !state.isTimerRunning; window.saveState(); };
        window.resetTimer = () => { state.timerSeconds = TIMER_DURATION; window.saveState(); };
        window.formatTime = (s) => {
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sec}`;
        };
        window.onload = () => {
            document.getElementById("teamSelect").innerHTML = Object.keys(window.TEAMS).map(t => `<option value="${t}">${window.TEAMS[t].name}</option>`).join('');
            window.updateMemberSelect();
        };
    </script>
</body>
</html>
